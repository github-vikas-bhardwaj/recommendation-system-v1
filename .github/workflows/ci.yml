# Guide: follow the steps in your chat / implementation doc
name: CI

on:
  pull_request:
    branches:
      - release/next
      - main
  push:
    branches:
      - release/next
      - main
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (npm ci)..."
          npm ci

      - name: ESLint
        run: |
          echo "🔍 Running linters..."
          echo "Running: npm run lint"
          npm run lint

  type-check:
    name: type-check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (npm ci)..."
          npm ci

      - name: Download Next.js build output
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: TypeScript
        run: |
          echo "🔍 Running type checking..."
          echo "Running: npm run type-check"
          npm run type-check

  knip:
    name: knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (npm ci)..."
          npm ci

      - name: Knip
        run: |
          echo "🔍 Running knip..."
          echo "Running: npm run knip"
          npm run knip

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies (npm ci)..."
          npm ci

      - name: Build
        run: |
          echo "🔍 Building the application..."
          echo "Running: npm run build"
          npm run build
          echo "✅ Build completed successfully"

      - name: Upload Next.js build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1
